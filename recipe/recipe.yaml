context:
  version: "22.1.8"
  build_number: 3
  # derived quanities
  major_version: "${{ (version | split('.'))[0] }}"
  # tail is not necessarily equal to patch version; e.g. 23.1.0.rc1
  tail_version: "${{ (version | split('.'))[-1] }}"
  # sover always includes minor as of v18, see https://github.com/llvm/llvm-project/issues/76273
  maj_min: "${{ (version | split('.'))[:2] | join('.') }}"
  # construct full sover, which contains extra suffixes for rc/dev builds
  # as of LLVM 19, we expect an "-rcX" suffix for the release candidates
  extra: ${{ "git" if tail_version|trim("0123456789") == "dev" else "-" ~ tail_version if tail_version not in "0123456789" else "" }}
  sover: ${{ maj_min ~ extra }}

  # see https://github.com/llvm/llvm-project/blob/release/22.x/clang/tools/libclang/CMakeLists.txt#L14
  libclang_soversion: "13"

recipe:
  name: clangdev
  version: ${{ version }}

source:
  - url: https://github.com/llvm/llvm-project/archive/refs/tags/llvmorg-${{ version|replace(".rc", "-rc") }}.tar.gz
    sha256: ad18b70e287954c3d62bc7e0b86e7b7af2adf87bcfce21c15fe717f101d7aace
    patches:
      - patches/0001-Find-conda-gcc-installation.patch
      - patches/0002-Fix-sysroot-detection-for-linux.patch
      - patches/0003-clang-add-conda-specific-env-var-CONDA_BUILD_SYSROOT.patch
      - patches/0004-Fix-normalizeProgramName-s-handling-of-dots-outside-.patch
      - patches/0005-Set-VERSION-in-osx-as-well.patch
      - patches/0006-set-libclang-SOVERSION-unconditionally.patch
      - patches/0007-Make-PIE-default-on-macOS-too.patch
      - patches/0008-Find-ROCm-device-library-in-conda-layout.patch
      - patches/0009-Add-conda-mingw-paths.patch
      - patches/0010-Look-for-libLTO.dylib-in-the-versioned-ResourceDir.patch
    # would like to use filter here: https://github.com/prefix-dev/rattler-build/issues/2581
    # filter:
    #   # we don't want to accidentally build more than clang here
    #   - cmake/*
    #   - clang/*
    #   - clang-tools-extra/*

build:
  number: ${{ build_number }}

outputs:
  - staging:
      name: clangdev-stage
    build:
      script:
        file: build
    requirements:
      build:
        - ${{ stdlib('c') }}
        - ${{ compiler('cxx') }}
        - cmake
        # "compiling .pyc files" fails without this
        - python >3
        - if: unix
          then: make
          else: ninja
        - if: build_platform != target_platform
          then:
            - llvmdev ==${{ version }}
            - libxml2-devel
            - zlib
            - zstd
      host:
        - llvmdev ==${{ version }}
        - libxml2-devel
        - zlib
        - zstd
        - if: osx
          then: libcxx-devel ${{ cxx_compiler_version }}.*

  - package:
      name: clangdev
    inherit: clangdev-stage
    build:
      string: ${{ variant }}_h${{ hash }}_${{ build_number }}
      script:
        file: install_clangdev
      variant:
        down_prioritize_variant: ${{ 0 if variant == "default" else 1 }}
    requirements:
      build:
        - ${{ stdlib('c') }}
        - ${{ compiler('cxx') }}
        - cmake
        - if: unix
          then: make
          else: ninja
        - if: build_platform != target_platform
          then:
            - llvmdev ==${{ version }}
            - libxml2-devel
            - zlib
            - zstd
      host:
        - ${{ pin_subpackage("clang", exact=True) }}
        - ${{ pin_subpackage("clangxx", exact=True) }}
        - ${{ pin_subpackage("clang-tools", exact=True) }}
        - ${{ pin_subpackage("libclang", exact=True) }}
        - ${{ pin_subpackage("libclang-cpp", exact=True) }}
        - llvmdev ==${{ version }}
        - libxml2-devel
        - zlib
        - zstd
        - if: osx
          # cannot pin to `cxx_compiler_version` here,
          # because clangxx pins libcxx-devel to `maj_min`
          then: libcxx-devel ${{ maj_min }}.*
      run:
        # without pin_subpackage because we want clangdev to be independent of cfg/nocfg
        - clang ==${{ version }} *_${{ build_number }}
        - clangxx ==${{ version }} *_${{ build_number }}
        - ${{ pin_subpackage("clang-tools", exact=True) }}
        - ${{ pin_subpackage("libclang", exact=True) }}
        - ${{ pin_subpackage("libclang-cpp", exact=True) }}
        - llvmdev ==${{ version }}
        - if: osx
          # we need to do this manually because clang_bootstrap has no run-export
          then: libcxx >=${{ version }}
      ignore_run_exports:
        from_package:
          - if: unix
            then:
              # the build fails if it doesn't find the following, but it's not used
              - libxml2-devel
              - zlib
              - zstd
    tests:
      - package_contents:
          include:
            - clang/Config/config.h
            - clang/Lex/Lexer.h
          files:
            # static libraries
            - if: unix
              then:
                - lib/libclangAST.a
                - lib/libclangBasic.a
              else:
                - Library/lib/clangAST.lib
                - Library/lib/clangBasic.lib
      - requirements:
          run:
            - ${{ compiler('cxx') }}
            - cmake
        files:
          recipe:
            - mytest.c
        script:
          - if: unix
            then:
              # symlinks
              - $PREFIX/bin/clang --version
              - $PREFIX/bin/clang++ --version
              - $PREFIX/bin/clang-check --version
              # basic compilation
              - $PREFIX/bin/clang -v -c mytest.c
            else:
              - '%LIBRARY_BIN%/clang -v -c mytest.c'

  - package:
      name: libclang-cpp${{ maj_min }}
    inherit: clangdev-stage
    build:
      skip: win
      string: ${{ variant }}_h${{ hash }}_${{ build_number }}
      script:
        file: install_libclang_cpp
      files:
        - if: linux
          then: lib/libclang-cpp.so.${{ sover }}
          else: lib/libclang-cpp.${{ sover }}.dylib
      variant:
        down_prioritize_variant: ${{ 0 if variant == "default" else 1 }}
    requirements:
      build:
        - ${{ stdlib('c') }}
        - ${{ compiler('cxx') }}
        - cmake
        - if: unix
          then: make
          else: ninja
        - if: build_platform != target_platform
          then: llvmdev ==${{ version }}
      host:
        - llvmdev ==${{ version }}
        - llvm ==${{ version }}
        # Use the same requirements as the top-level requirements
        - libxml2-devel
        - zlib
        - zstd
        - if: osx
          then: libcxx-devel ${{ cxx_compiler_version }}.*
      run:
        - if: osx
          # we need to do this manually because clang_bootstrap has no run-export
          then: libcxx >=${{ version }}
      run_exports:
        - ${{ pin_subpackage("libclang-cpp" ~ maj_min, upper_bound="x.x") }}
      ignore_run_exports:
        from_package:
          - if: unix
            then:
              # the build fails if it doesn't find the following, but it's not used
              - libxml2-devel
              - zlib
              - zstd
    tests:
      - package_contents:
          files:
            # presence of versioned library
            exists:
              - if: linux
                then: lib/libclang-cpp.so.${{ sover }}
                else: lib/libclang-cpp.${{ sover }}.dylib
            # absence of unversioned library
            not_exists:
              - if: linux
                then: lib/libclang-cpp.so
                else: lib/libclang-cpp.dylib

  - package:
      name: libclang-cpp
    inherit: clangdev-stage
    build:
      string: ${{ variant }}_h${{ hash }}_${{ build_number }}
      script:
        file: install_libclang_cpp
      files:
        - if: linux
          then: lib/libclang-cpp.so
        - if: osx
          then: lib/libclang-cpp.dylib
        # this is just an empty wrapper on windows
      variant:
        down_prioritize_variant: ${{ 0 if variant == "default" else 1 }}
    requirements:
      build:
        - ${{ stdlib('c') }}
        - ${{ compiler('cxx') }}
        - cmake
        - if: unix
          then: make
          else: ninja
        - if: build_platform != target_platform
          then: llvmdev ==${{ version }}
      host:
        - if: unix
          then: ${{ pin_subpackage("libclang-cpp" ~ maj_min, exact=True) }}
        - llvmdev ==${{ version }}
        - llvm ==${{ version }}
          # Use the same requirements as the top-level requirements
        - libxml2-devel
        - zlib
        - zstd
        - if: osx
          then: libcxx-devel ${{ cxx_compiler_version }}.*
      run:
        - if: unix
          then: ${{ pin_subpackage("libclang-cpp" ~ maj_min, exact=True) }}
        - if: osx
          # we need to do this manually because clang_bootstrap has no run-export
          then: libcxx >=${{ version }}
      run_exports:
        - if: unix
          then: ${{ pin_subpackage("libclang-cpp" ~ maj_min, upper_bound="x.x") }}
      ignore_run_exports:
        from_package:
          - if: unix
            then:
              # the build fails if it doesn't find the following, but it's not used
              - libxml2-devel
              - zlib
              - zstd
    tests:
      - package_contents:
          files:
            # presence of versioned library on unix
            exists:
              - if: linux
                then: lib/libclang-cpp.so
              - if: osx
                then: lib/libclang-cpp.dylib
            # absence on windows
            not_exists:
              - if: win
                then:
                  - Library/bin/libclang-cpp.dll
                  - Library/lib/libclang-cpp.lib

  - package:
      name: libclang${{ libclang_soversion }}
    inherit: clangdev-stage
    build:
      string: ${{ variant }}_h${{ hash }}_${{ build_number }}
      script:
        file: install_libclang
      files:
        - if: linux
          then: lib/libclang.so.${{ libclang_soversion }}
        - if: osx
          then: lib/libclang.${{ libclang_soversion }}.dylib
        - if: win
          then: Library/bin/libclang-${{ libclang_soversion }}.dll
      variant:
        down_prioritize_variant: ${{ 0 if variant == "default" else 1 }}
    requirements:
      build:
        - ${{ stdlib('c') }}
        - ${{ compiler('cxx') }}
        - cmake
        - if: unix
          then: make
          else:
            - ninja
            - create-forwarder-dll
        - if: build_platform != target_platform
          then:
            - llvmdev ==${{ version }}
            - libxml2-devel
            - zlib
            - zstd
      host:
        - llvmdev ==${{ version }}
        - llvm ==${{ version }}
          # Use the same requirements as the top-level requirements
        - libxml2-devel
        - zlib
        - zstd
        - if: osx
          then: libcxx-devel ${{ cxx_compiler_version }}.*
      run:
        - if: unix
          then: ${{ pin_subpackage("libclang-cpp" ~ maj_min, exact=True) }}
        - if: osx
          # we need to do this manually because clang_bootstrap has no run-export
          then: libcxx >=${{ version }}
      run_exports:
        # note that the name (e.g. libclang13) does not necessarily
        # match the version lower bound (e.g. >=14.0.0)
        - ${{ pin_subpackage("libclang" ~ libclang_soversion, upper_bound=None) }}
      ignore_run_exports:
        from_package:
          - if: unix
            then:
              # the build fails if it doesn't find the following, but it's not used
              - libxml2-devel
              - zlib
              - zstd
    tests:
      - package_contents:
          files:
            # presence of versioned libraries
            exists:
              - if: linux
                then: lib/libclang.so.${{ libclang_soversion }}
              - if: osx
                then: lib/libclang.${{ libclang_soversion }}.dylib
              - if: win
                then: Library/bin/libclang-${{ libclang_soversion }}.dll
            # absence of unversioned (or misversioned) libraries
            not_exists:
              - if: linux
                then:
                  - lib/libclang.so
                  - lib/libclang.so.${{ major_version }}
                  - lib/libclang.so.${{ version }}
              - if: osx
                then:
                  - lib/libclang.dylib
                  - libclang.${{ major_version }}.dylib
                  - libclang.${{ version }}.dylib
              - if: win
                then:
                  - Library/lib/libclang.lib
                  - Library/bin/libclang.dll
                  - Library/bin/libclang-${{ major_version }}.dll
                  - Library/bin/libclang-${{ version }}.dll

  - name: libclang
    script: install_libclang.sh   # [unix]
    script: install_libclang.bat  # [win]
    files:
      - Library/bin/libclang.dll  # [win]
      - Library/lib/libclang.lib  # [win]
      - lib/libclang.so           # [linux]
      - lib/libclang.dylib        # [osx]
    build:
      track_features:
        - root         # [variant and variant.startswith("root_")]
      string: {{ variant }}_h{{ PKG_HASH }}_{{ build_number }}
      run_exports:
        # note that the name (e.g. libclang13) does not necessarily
        # match the version lower bound (e.g. >=14.0.0)
        - {{ pin_subpackage("libclang" ~ libclang_soversion, max_pin=None) }}
      ignore_run_exports_from:
        # the build fails if it doesn't find the following, but it's not used
        - libxml2-devel     # [unix]
        - zlib              # [unix]
        - zstd              # [unix]
    requirements:
      build:
        - {{ stdlib('c') }}
        - {{ compiler('cxx') }}
        - cmake
        - ninja                     # [win]
        - make                      # [unix]
        - create-forwarder-dll      # [win]
        - llvmdev {{ version }}     # [build_platform != target_platform]
        - libxml2-devel             # [build_platform != target_platform]
        - zlib                      # [build_platform != target_platform]
        - zstd                      # [build_platform != target_platform]
      host:
        - llvm {{ version }}
        - {{ pin_subpackage("libclang" ~ libclang_soversion, exact=True) }}
        # Use the same requirements as the top-level requirements
        - libcxx-devel {{ cxx_compiler_version }}   # [osx]
        - llvmdev {{ version }}
        - libxml2-devel
        - zlib
        - zstd
      run:
        - {{ pin_subpackage("libclang" ~ libclang_soversion, exact=True) }}
        # we need to do this manually because clang_bootstrap has no run-export
        - libcxx >={{ version }}    # [osx]
    test:
      commands:
        - test -f $PREFIX/lib/libclang.so                   # [linux]
        - test -f $PREFIX/lib/libclang.dylib                # [osx]
        - if not exist %LIBRARY_LIB%\libclang.lib exit 1    # [win]

  - name: clang-{{ major_version }}
    script: install_clang_maj.sh  # [unix]
    script: install_clang_maj.bat  # [win]
    files:
      - lib/clang                                    # [unix]
      - bin/clang-{{ major_version }}                # [unix]
      - bin/clang++-{{ major_version }}              # [unix]
      - Library/lib/clang                            # [win]
      - Library/bin/clang-{{ major_version }}.exe    # [win]
      - Library/bin/clang++-{{ major_version }}.exe  # [win]
    build:
      track_features:
        - root         # [variant and variant.startswith("root_")]
      string: {{ variant }}_h{{ PKG_HASH }}_{{ build_number }}
      ignore_run_exports_from:
        # the build fails if it doesn't find the following, but it's not used
        - libxml2-devel
        - zlib     # [unix]
        - zstd     # [unix]
        - llvm-openmp
    requirements:
      build:
        - {{ stdlib('c') }}
        - {{ compiler('cxx') }}
        - cmake
        - ninja                     # [win]
        - make                      # [unix]
        - llvmdev {{ version }}     # [build_platform != target_platform]
        - libxml2-devel             # [build_platform != target_platform]
        - zlib                      # [build_platform != target_platform]
        - zstd                      # [build_platform != target_platform]
      host:
        - llvm {{ version }}
        - {{ pin_subpackage("libclang-cpp" ~ maj_min, exact=True) }}  # [unix]
        # Use the same requirements as the top-level requirements
        - libcxx-devel {{ cxx_compiler_version }}   # [osx]
        - llvmdev {{ version }}
        - libxml2-devel
        - zlib
        - zstd
        - llvm-openmp {{ version }}
      run:
        - compiler-rt{{ major_version }} {{ version }}
        - {{ pin_subpackage("libclang-cpp" ~ maj_min, exact=True) }}  # [unix]
        # we need to do this manually because clang_bootstrap has no run-export
        - libcxx >={{ version }}    # [osx]
    test:
      requires:
        - llvm-openmp {{ version }}
      commands:
        # presence of versioned libraries
        - test -f $PREFIX/lib/libclang-cpp.so.{{ sover }}       # [linux]
        - test -f $PREFIX/lib/libclang-cpp.{{ sover }}.dylib    # [osx]

        # absence of unversioned libraries
        - test ! -f $PREFIX/lib/libclang-cpp.so                 # [linux]
        - test ! -f $PREFIX/lib/libclang-cpp.dylib              # [osx]

        # headers
        - test -f $PREFIX/lib/clang/{{ major_version }}/include/stdatomic.h                 # [unix]
        - test -f $PREFIX/lib/clang/{{ major_version }}/include/omp.h                       # [unix]
        - if not exist %LIBRARY_LIB%\clang\{{ major_version }}\include\stdatomic.h exit 1   # [win]
        - if not exist %LIBRARY_LIB%\clang\{{ major_version }}\include\omp.h exit 1         # [win]

        # versioned binaries
        - clang-{{ major_version }} --version
        - clang++-{{ major_version }} --version

        # absence of unversioned binaries
        - test ! -f $PREFIX/bin/clang                   # [unix]
        - test ! -f $PREFIX/bin/clang-cl                # [unix]
        - test ! -f $PREFIX/bin/clang-cpp               # [unix]
        - if exist %LIBRARY_BIN%\clang.exe exit 1       # [win]
        - if exist %LIBRARY_BIN%\clang-cl.exe exit 1    # [win]
        - if exist %LIBRARY_BIN%\clang-cpp.exe exit 1   # [win]

  - name: clang_impl_{{ target_platform }}
    script: install_clang_symlinks.sh
    build:
      track_features:
        - root         # [variant and variant.startswith("root_")]
      string: {{ variant }}_h{{ PKG_HASH }}_{{ build_number }}
      skip: true  # [win]
    requirements:
      host:
        - {{ pin_subpackage("clang-" ~ major_version, exact=True) }}
      run:
        - {{ pin_subpackage("clang-" ~ major_version, exact=True) }}
        - compiler-rt_{{ target_platform }}
        - compiler-rt {{ version }}.*
        - binutils_impl_{{ target_platform }}  # [linux]
        - sysroot_{{ target_platform }}        # [linux]
        - libgcc-devel_{{ target_platform }}   # [linux]
        - cctools_impl_{{ target_platform }}   # [osx]
        - ld64_{{ target_platform }} * llvm{{ maj_min.replace(".", "_") }}_*    # [osx]
    test:
      commands:
        - x86_64-conda-linux-gnu-clang --version         # [linux64]
        - x86_64-conda-linux-gnu-clang-cpp --version     # [linux64]
        - powerpc64le-conda-linux-gnu-clang --version    # [linux and ppc64le]
        - powerpc64le-conda-linux-gnu-clang-cpp --version  # [linux and ppc64le]
        - x86_64-apple-darwin13.4.0-clang --version      # [osx and x86_64]
        - x86_64-apple-darwin13.4.0-clang-cpp --version  # [osx and x86_64]

  - name: clang
    script: install_clang_symlinks.sh  # [unix]
    script: install_clang_symlinks.bat  # [win]
    build:
      track_features:
        - root         # [variant and variant.startswith("root_")]
        - clang_nocfg  # [unix and not with_cfg]
      string: {{ variant }}_cfg_h{{ PKG_HASH }}_{{ build_number }}    # [with_cfg]
      string: {{ variant }}_nocfg_h{{ PKG_HASH }}_{{ build_number }}  # [not with_cfg]
      ignore_run_exports_from:
        # the build fails if it doesn't find the following, but it's not used
        - libxml2-devel
        - zlib     # [unix]
        - zstd     # [unix]
    requirements:
      # for run-exports
      build:                        # [win]
        - {{ stdlib('c') }}         # [win]
        - {{ compiler('cxx') }}     # [win]
      host:
        - {{ pin_subpackage("clang-" ~ major_version, exact=True) }}
        # Use the same requirements as the top-level requirements
        - libcxx-devel {{ cxx_compiler_version }}   # [osx]
        - llvmdev {{ version }}
        - libxml2-devel
        - zlib
        - zstd
      run:
        - binutils                             # [linux]
        - sysroot_{{ target_platform }}        # [linux]
        - libgcc-devel_{{ target_platform }}   # [linux]
        - {{ pin_subpackage("clang-" ~ major_version, exact=True) }}
        - {{ pin_subpackage("clang_impl_" ~ target_platform, exact=True) }}     # [unix]
        - ld64_{{ target_platform }} * llvm{{ maj_min.replace(".", "_") }}_*    # [osx]
        - llvm-tools {{ version }}.*           # [osx]
        - ld64                                 # [osx]
        - cctools                              # [osx]
        - llvm-openmp >={{ version }}
    test:
      commands:
        - clang --version
        - clang-cl --version
        - clang-cpp --version

        # test that compiler-rt bits are available where clang expects them to be
        - test -f $PREFIX/lib/clang/{{ major_version }}/lib/linux/clang_rt.crtend-x86_64.o       # [linux and x86_64]
        - test -f $PREFIX/lib/clang/{{ major_version }}/lib/linux/clang_rt.crtend-aarch64.o      # [linux and aarch64]
        - test -f $PREFIX/lib/clang/{{ major_version }}/lib/linux/clang_rt.crtend-powerpc64le.o  # [linux and ppc64le]
        - test -f $PREFIX/lib/clang/{{ major_version }}/lib/darwin/libclang_rt.osx.a             # [osx]
        - if not exist %LIBRARY_LIB%\clang\{{ major_version }}\lib\windows\clang_rt.builtins-x86_64.lib exit 1  # [win and x64_64]

  - name: clangxx_impl_{{ target_platform }}
    script: install_clang_symlinks.sh
    build:
      track_features:
        - root         # [variant and variant.startswith("root_")]
      string: {{ variant }}_h{{ PKG_HASH }}_{{ build_number }}
      skip: true  # [win]
    requirements:
      host:
        - {{ pin_subpackage("clang-" ~ major_version, exact=True) }}
      run:
        - {{ pin_subpackage("clang-" ~ major_version, exact=True) }}
        - {{ pin_subpackage("clang_impl_" ~ target_platform, exact=True) }}
        - {{ pin_subpackage("clang-scan-deps", exact=True) }}
        - libstdcxx-devel_{{ target_platform }}  # [linux]
        # only minor-pin to avoid issues when building new libcxx versions
        - libcxx-devel {{ maj_min }}             # [osx]
    test:
      commands:
        - x86_64-conda-linux-gnu-clang++ --version          # [linux and x86_64]
        - aarch64-conda-linux-gnu-clang++ --version         # [linux and aarch64]
        - powerpc64le-conda-linux-gnu-clang++ --version     # [linux and ppc64le]
        - x86_64-apple-darwin13.4.0-clang++ --version       # [osx and x86_64]
        - arm64-apple-darwin20.0.0-clang++ --version        # [osx and arm64]

  - name: clangxx
    script: install_clang_symlinks.sh  # [unix]
    script: install_clang_symlinks.bat  # [win]
    build:
      track_features:
        - root         # [variant and variant.startswith("root_")]
        - clang_nocfg  # [unix and not with_cfg]
      string: {{ variant }}_cfg_h{{ PKG_HASH }}_{{ build_number }}    # [with_cfg]
      string: {{ variant }}_nocfg_h{{ PKG_HASH }}_{{ build_number }}  # [not with_cfg]
      ignore_run_exports_from:
        # the build fails if it doesn't find the following, but it's not used
        - libxml2-devel
        - zlib     # [unix]
        - zstd     # [unix]
    requirements:
      # for run-exports
      build:                        # [win]
        - {{ stdlib('c') }}         # [win]
        - {{ compiler('cxx') }}     # [win]
      host:
        - {{ pin_subpackage("clangxx_impl_" ~ target_platform, exact=True) }}  # [unix]
        - {{ pin_subpackage("clang-" ~ major_version, exact=True) }}
        # cannot pin to `cxx_compiler_version` here,
        # because clangxx_impl_ pins libcxx-devel to `maj_min`
        - libcxx-devel {{ maj_min }}    # [osx]
        - llvmdev {{ version }}
        - libxml2-devel
        - zlib
        - zstd
      run:
        - {{ pin_subpackage("clangxx_impl_" ~ target_platform, exact=True) }}  # [unix]
        - libstdcxx-devel_{{ target_platform }}  # [linux]
        # only minor-pin to avoid issues when building new libcxx versions
        - libcxx-devel {{ maj_min }}             # [osx]
        - {{ pin_subpackage("clang", exact=True) }}
    test:
      requires:
        - {{ compiler("cxx") }}
        - gxx_impl_{{ target_platform }}  # [win64]
      files:
        - mytest.cxx
      commands:
        # avoid CMake picking up random clang in image when using unactivated compilers
        - del /s /q "C:\Program Files\Microsoft Visual Studio\2022\Enterprise\VC\Tools\Llvm\x64\bin\clang++.exe"  # [win]
        - clang++ --version
        - clang++-{{ major_version }} --version
        - clang++ -v -c mytest.cxx
        - unset CONDA_BUILD_SYSROOT   # [unix]
        - set "CONDA_BUILD_SYSROOT="  # [win]
        - clang++ -v -c mytest.cxx
        - clang++ -v mytest.cxx --target=x86_64-w64-mingw32  # [win64]

  - name: clang-format-{{ major_version }}
    script: install_clang_format.sh  # [unix]
    files:
      - bin/clang-format-{{ major_version }}                # [unix]
    build:
      track_features:
        - root         # [variant and variant.startswith("root_")]
      string: {{ variant }}_h{{ PKG_HASH }}_{{ build_number }}
      # for windows, use the clang-format package.
      skip: true  # [win]
      ignore_run_exports_from:
        # the build fails if it doesn't find the following, but it's not used
        - libxml2-devel     # [unix]
        - zlib              # [unix]
        - zstd              # [unix]
    requirements:
      build:
        # "compiling .pyc files" fails without this
        - python >3
        - {{ stdlib('c') }}
        - {{ compiler('cxx') }}
        - cmake
        - make   # [unix]
        - llvmdev {{ version }}     # [build_platform != target_platform]
      host:
        # it does not matter whether we use cfg or nocfg clang{,xx} in host
        - {{ pin_subpackage("clang", exact=True) }}
        - {{ pin_subpackage("clangxx", exact=True) }}
        - {{ pin_subpackage("libclang", exact=True) }}
        - {{ pin_subpackage("libclang-cpp", exact=True) }}
        # cannot pin to `cxx_compiler_version` here,
        # because clangxx pins libcxx-devel to `maj_min`
        - libcxx-devel {{ maj_min }}    # [osx]
        - llvmdev {{ version }}
        - llvm {{ version }}
        - libxml2-devel
        - zlib
        - zstd
      run:
        - {{ pin_subpackage("libclang-cpp" ~ maj_min, max_pin="x.x") }}   # [unix]
        # we need to do this manually because clang_bootstrap has no run-export
        - libcxx >={{ version }}    # [osx]
    test:
      commands:
        - clang-format-{{ major_version }} --version
        - test ! -f ${PREFIX}/bin/clang-format                   # [unix]
        - test ! -f ${PREFIX}/bin/c-index-test                   # [unix]

  - name: clang-format
    script: install_clang_format.sh  # [unix]
    script: install_clang_format.bat  # [win]
    files:
      - bin/clang-format               # [unix]
      - Library/bin/clang-format.exe   # [win]
    build:
      track_features:
        - root         # [variant and variant.startswith("root_")]
      string: {{ variant }}_h{{ PKG_HASH }}_{{ build_number }}
      ignore_run_exports_from:
        # the build fails if it doesn't find the following, but it's not used
        - libxml2-devel
        - zlib
        - zstd
    requirements:
      build:
        # "compiling .pyc files" fails without this
        - python >3
        - {{ stdlib('c') }}
        - {{ compiler('cxx') }}
        - cmake
        - ninja  # [win]
        - make   # [unix]
        - llvmdev {{ version }}     # [build_platform != target_platform]
        - libxml2-devel             # [build_platform != target_platform]
        - zlib                      # [build_platform != target_platform]
        - zstd                      # [build_platform != target_platform]
      host:
        # it does not matter whether we use cfg or nocfg clang{,xx} in host
        - {{ pin_subpackage("clang", exact=True) }}
        - {{ pin_subpackage("clangxx", exact=True) }}
        - {{ pin_subpackage("libclang", exact=True) }}
        - {{ pin_subpackage("libclang-cpp", exact=True) }}
        - {{ pin_subpackage("clang-format-" ~ major_version, exact=True) }}      # [unix]
        # cannot pin to `cxx_compiler_version` here,
        # because clangxx pins libcxx-devel to `maj_min`
        - libcxx-devel {{ maj_min }}    # [osx]
        - llvmdev {{ version }}
        - llvm {{ version }}
        - libxml2-devel
        - zlib
        - zstd
      run:
        - {{ pin_subpackage("libclang-cpp" ~ maj_min, max_pin="x.x") }}          # [unix]
        - {{ pin_subpackage("clang-format-" ~ major_version, exact=True) }}      # [unix]
        # we need to do this manually because clang_bootstrap has no run-export
        - libcxx >={{ version }}    # [osx]
    test:
      commands:
        - clang-format --version
        - test ! -f ${PREFIX}/bin/c-index-test                   # [unix]
        - if exist %LIBRARY_BIN%\c-index-test.exe exit 1         # [win]

  - name: clang-scan-deps
    script: install_clang_scan_deps.sh  # [unix]
    files:
      - bin/clang-scan-deps
      - bin/clang-scan-deps-{{ major_version }}
      - bin/x86_64-conda-linux-gnu-clang-scan-deps          # [linux and x86_64]
      - bin/aarch64-conda-linux-gnu-clang-scan-deps         # [linux and aarch64]
      - bin/powerpc64le-conda-linux-gnu-clang-scan-deps     # [linux and ppc64le]
      - bin/x86_64-apple-darwin13.4.0-clang-scan-deps       # [osx and x86_64]
      - bin/arm64-apple-darwin20.0.0-clang-scan-deps        # [osx and arm64]
    build:
      skip: true  # [win]
      track_features:
        - root         # [variant and variant.startswith("root_")]
      string: {{ variant }}_h{{ PKG_HASH }}_{{ build_number }}
      ignore_run_exports_from:
        # the build fails if it doesn't find the following, but it's not used
        - libxml2-devel
        - zlib
        - zstd
    requirements:
      build:
        # "compiling .pyc files" fails without this
        - python >3
        - {{ stdlib('c') }}
        - {{ compiler('cxx') }}
        - cmake
        - make
        - llvmdev {{ version }}     # [build_platform != target_platform]
      host:
        - {{ pin_subpackage("libclang", exact=True) }}
        - {{ pin_subpackage("libclang-cpp", exact=True) }}
        # cannot pin to `cxx_compiler_version` here,
        # because clangxx pins libcxx-devel to `maj_min`
        - libcxx-devel {{ maj_min }}    # [osx]
        - llvmdev {{ version }}
        - llvm {{ version }}
        - libxml2-devel
        - zlib
        - zstd
      run:
        - {{ pin_subpackage("libclang" ~ libclang_soversion, max_pin=None) }}
        - {{ pin_subpackage("libclang-cpp" ~ maj_min, max_pin="x.x") }}
        # we need to do this manually because clang_bootstrap has no run-export
        - libcxx >={{ version }}    # [osx]
    test:
      commands:
        - clang-scan-deps --version
        - clang-scan-deps-{{ major_version }} --version
        - x86_64-conda-linux-gnu-clang-scan-deps --version          # [linux and x86_64]
        - aarch64-conda-linux-gnu-clang-scan-deps --version         # [linux and aarch64]
        - powerpc64le-conda-linux-gnu-clang-scan-deps --version     # [linux and ppc64le]
        - x86_64-apple-darwin13.4.0-clang-scan-deps --version       # [osx and x86_64]
        - arm64-apple-darwin20.0.0-clang-scan-deps --version        # [osx and arm64]

  - name: clang-tools
    script: install_clang_tools.sh  # [unix]
    script: install_clang_tools.bat  # [win]
    build:
      track_features:
        - root         # [variant and variant.startswith("root_")]
      string: {{ variant }}_h{{ PKG_HASH }}_{{ build_number }}
      ignore_run_exports_from:
        # the build fails if it doesn't find the following, but it's not used
        - zlib     # [unix]
        - zstd     # [unix]
    requirements:
      build:
        # "compiling .pyc files" fails without this
        - python >3
        - {{ stdlib('c') }}
        - {{ compiler('cxx') }}
        - cmake
        - ninja  # [win]
        - make   # [unix]
        - llvmdev {{ version }}     # [build_platform != target_platform]
        - libxml2-devel             # [build_platform != target_platform]
        - zlib                      # [build_platform != target_platform]
        - zstd                      # [build_platform != target_platform]
      host:
        # it does not matter whether we use cfg or nocfg clang{,xx} in host
        - {{ pin_subpackage("clang", exact=True) }}
        - {{ pin_subpackage("clangxx", exact=True) }}
        - {{ pin_subpackage("libclang", exact=True) }}
        - {{ pin_subpackage("libclang-cpp", exact=True) }}
        - {{ pin_subpackage("clang-format", exact=True) }}
        # cannot pin to `cxx_compiler_version` here,
        # because clangxx pins libcxx-devel to `maj_min`
        - libcxx-devel {{ maj_min }}    # [osx]
        - llvmdev {{ version }}
        - llvm {{ version }}
        - libxml2-devel
        - zlib
        - zstd
      run:
        - ucrt                                                 # [win and x86_64]
        - {{ pin_subpackage("clang-format", exact=True) }}
        - {{ pin_subpackage("clang-scan-deps", exact=True) }}  # [unix]
        - {{ pin_subpackage("libclang" ~ libclang_soversion, max_pin=None) }}
        - {{ pin_subpackage("libclang-cpp" ~ maj_min, max_pin="x.x") }}   # [unix]
        # we need to do this manually because clang_bootstrap has no run-export
        - libcxx >={{ version }}    # [osx]
      run_constrained:
        - clangdev {{ version }}
    test:
      commands:
        - clang-check --version
        - clang-tidy --version
        # absence of "doubly versioned" binaries
        - test -z "$(find "${PREFIX}/bin" -name '*-{{ major_version }}-{{ major_version }}' -print)"    # [unix]

  - name: python-clang
    build:
      noarch: python
      # Building this output using this recipe is only supported on unix
      # It can still be installed on Windows as it is marked as `noarch: python`
      skip: true  # [not linux64]
      string: {{ variant }}_h{{ PKG_HASH }}_{{ build_number }}
    script: build_python_bindings.sh
    requirements:
      host:
        - python {{ python_min }}
      run:
        - python >={{ python_min }}
        - libclang {{ version }}
    test:
      requires:
        - python {{ python_min }}
      source_files:
        - clang/bindings/python/tests
        - clang/bindings/python/examples/cindex
        - clang/include/clang-c
      imports:
        - clang
        - clang.cindex
      commands:
        - cd clang/bindings/python
        - python -m unittest discover -v

