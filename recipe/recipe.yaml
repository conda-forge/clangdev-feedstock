context:
  version: "22.1.8"
  build_number: 3
  # derived quanities
  major_version: "${{ (version | split('.'))[0] }}"
  # tail is not necessarily equal to patch version; e.g. 23.1.0.rc1
  tail_version: "${{ (version | split('.'))[-1] }}"
  # sover always includes minor as of v18, see https://github.com/llvm/llvm-project/issues/76273
  maj_min: "${{ (version | split('.'))[:2] | join('.') }}"
  # construct full sover, which contains extra suffixes for rc/dev builds
  # as of LLVM 19, we expect an "-rcX" suffix for the release candidates
  extra: ${{ "git" if tail_version|trim("0123456789") == "dev" else "-" ~ tail_version if tail_version not in "0123456789" else "" }}
  sover: ${{ maj_min ~ extra }}

  # see https://github.com/llvm/llvm-project/blob/release/22.x/clang/tools/libclang/CMakeLists.txt#L14
  libclang_soversion: "13"

recipe:
  name: clangdev
  version: ${{ version }}

source:
  - url: https://github.com/llvm/llvm-project/archive/refs/tags/llvmorg-${{ version|replace(".rc", "-rc") }}.tar.gz
    sha256: ad18b70e287954c3d62bc7e0b86e7b7af2adf87bcfce21c15fe717f101d7aace
    patches:
      - patches/0001-Find-conda-gcc-installation.patch
      - patches/0002-Fix-sysroot-detection-for-linux.patch
      - patches/0003-clang-add-conda-specific-env-var-CONDA_BUILD_SYSROOT.patch
      - patches/0004-Fix-normalizeProgramName-s-handling-of-dots-outside-.patch
      - patches/0005-Set-VERSION-in-osx-as-well.patch
      - patches/0006-set-libclang-SOVERSION-unconditionally.patch
      - patches/0007-Make-PIE-default-on-macOS-too.patch
      - patches/0008-Find-ROCm-device-library-in-conda-layout.patch
      - patches/0009-Add-conda-mingw-paths.patch
      - patches/0010-Look-for-libLTO.dylib-in-the-versioned-ResourceDir.patch
    # would like to use filter here: https://github.com/prefix-dev/rattler-build/issues/2581
    # filter:
    #   # we don't want to accidentally build more than clang here
    #   - cmake/*
    #   - clang/*
    #   - clang-tools-extra/*

build:
  number: ${{ build_number }}

outputs:
  - staging:
      name: clangdev-stage
    build:
      script:
        file: build
    requirements:
      build:
        - ${{ stdlib('c') }}
        - ${{ compiler('cxx') }}
        - cmake
        # "compiling .pyc files" fails without this
        - python >3
        - if: unix
          then: make
          else: ninja
        - if: build_platform != target_platform
          then:
            - llvmdev ==${{ version }}
            - libxml2-devel
            - zlib
            - zstd
      host:
        - llvmdev ==${{ version }}
        - libxml2-devel
        - zlib
        - zstd
        - if: osx
          then: libcxx-devel ${{ cxx_compiler_version }}.*

  - package:
      name: clangdev
    inherit: clangdev-stage
    build:
      string: ${{ variant }}_h${{ hash }}_${{ build_number }}
      script:
        file: install_clangdev
      variant:
        down_prioritize_variant: ${{ 0 if variant == "default" else 1 }}
    requirements:
      build:
        - ${{ stdlib('c') }}
        - ${{ compiler('cxx') }}
        - cmake
        - if: unix
          then: make
          else: ninja
        - if: build_platform != target_platform
          then:
            - llvmdev ==${{ version }}
            - libxml2-devel
            - zlib
            - zstd
      host:
        - ${{ pin_subpackage("clang", exact=True) }}
        - ${{ pin_subpackage("clangxx", exact=True) }}
        - ${{ pin_subpackage("clang-tools", exact=True) }}
        - ${{ pin_subpackage("libclang", exact=True) }}
        - ${{ pin_subpackage("libclang-cpp", exact=True) }}
        - llvmdev ==${{ version }}
        - libxml2-devel
        - zlib
        - zstd
        - if: osx
          # cannot pin to `cxx_compiler_version` here,
          # because clangxx pins libcxx-devel to `maj_min`
          then: libcxx-devel ${{ maj_min }}.*
      run:
        # without pin_subpackage because we want clangdev to be independent of cfg/nocfg
        - clang ==${{ version }} *_${{ build_number }}
        - clangxx ==${{ version }} *_${{ build_number }}
        - ${{ pin_subpackage("clang-tools", exact=True) }}
        - ${{ pin_subpackage("libclang", exact=True) }}
        - ${{ pin_subpackage("libclang-cpp", exact=True) }}
        - llvmdev ==${{ version }}
        - if: osx
          # we need to do this manually because clang_bootstrap has no run-export
          then: libcxx >=${{ version }}
      ignore_run_exports:
        from_package:
          - if: unix
            then:
              # the build fails if it doesn't find the following, but it's not used
              - libxml2-devel
              - zlib
              - zstd
    tests:
      - package_contents:
          include:
            - clang/Config/config.h
            - clang/Lex/Lexer.h
          files:
            # static libraries
            - if: unix
              then:
                - lib/libclangAST.a
                - lib/libclangBasic.a
              else:
                - Library/lib/clangAST.lib
                - Library/lib/clangBasic.lib
      - requirements:
          run:
            - ${{ compiler('cxx') }}
            - cmake
        files:
          recipe:
            - mytest.c
        script:
          - if: unix
            then:
              # symlinks
              - $PREFIX/bin/clang --version
              - $PREFIX/bin/clang++ --version
              - $PREFIX/bin/clang-check --version
              # basic compilation
              - $PREFIX/bin/clang -v -c mytest.c
            else:
              - '%LIBRARY_BIN%/clang -v -c mytest.c'

  - package:
      name: libclang-cpp${{ maj_min }}
    inherit: clangdev-stage
    build:
      skip: win
      string: ${{ variant }}_h${{ hash }}_${{ build_number }}
      script:
        file: install_libclang_cpp
      files:
        - if: linux
          then: lib/libclang-cpp.so.${{ sover }}
          else: lib/libclang-cpp.${{ sover }}.dylib
      variant:
        down_prioritize_variant: ${{ 0 if variant == "default" else 1 }}
    requirements:
      build:
        - ${{ stdlib('c') }}
        - ${{ compiler('cxx') }}
        - cmake
        - if: unix
          then: make
          else: ninja
        - if: build_platform != target_platform
          then: llvmdev ==${{ version }}
      host:
        - llvmdev ==${{ version }}
        - llvm ==${{ version }}
        # Use the same requirements as the top-level requirements
        - libxml2-devel
        - zlib
        - zstd
        - if: osx
          then: libcxx-devel ${{ cxx_compiler_version }}.*
      run:
        - if: osx
          # we need to do this manually because clang_bootstrap has no run-export
          then: libcxx >=${{ version }}
      run_exports:
        - ${{ pin_subpackage("libclang-cpp" ~ maj_min, upper_bound="x.x") }}
      ignore_run_exports:
        from_package:
          - if: unix
            then:
              # the build fails if it doesn't find the following, but it's not used
              - libxml2-devel
              - zlib
              - zstd
    tests:
      - package_contents:
          files:
            # presence of versioned library
            exists:
              - if: linux
                then: lib/libclang-cpp.so.${{ sover }}
                else: lib/libclang-cpp.${{ sover }}.dylib
            # absence of unversioned library
            not_exists:
              - if: linux
                then: lib/libclang-cpp.so
                else: lib/libclang-cpp.dylib

  - package:
      name: libclang-cpp
    inherit: clangdev-stage
    build:
      string: ${{ variant }}_h${{ hash }}_${{ build_number }}
      script:
        file: install_libclang_cpp
      files:
        - if: linux
          then: lib/libclang-cpp.so
        - if: osx
          then: lib/libclang-cpp.dylib
        # this is just an empty wrapper on windows
      variant:
        down_prioritize_variant: ${{ 0 if variant == "default" else 1 }}
    requirements:
      build:
        - ${{ stdlib('c') }}
        - ${{ compiler('cxx') }}
        - cmake
        - if: unix
          then: make
          else: ninja
        - if: build_platform != target_platform
          then: llvmdev ==${{ version }}
      host:
        - if: unix
          then: ${{ pin_subpackage("libclang-cpp" ~ maj_min, exact=True) }}
        - llvmdev ==${{ version }}
        - llvm ==${{ version }}
          # Use the same requirements as the top-level requirements
        - libxml2-devel
        - zlib
        - zstd
        - if: osx
          then: libcxx-devel ${{ cxx_compiler_version }}.*
      run:
        - if: unix
          then: ${{ pin_subpackage("libclang-cpp" ~ maj_min, exact=True) }}
        - if: osx
          # we need to do this manually because clang_bootstrap has no run-export
          then: libcxx >=${{ version }}
      run_exports:
        - if: unix
          then: ${{ pin_subpackage("libclang-cpp" ~ maj_min, upper_bound="x.x") }}
      ignore_run_exports:
        from_package:
          - if: unix
            then:
              # the build fails if it doesn't find the following, but it's not used
              - libxml2-devel
              - zlib
              - zstd
    tests:
      - package_contents:
          files:
            # presence of versioned library on unix
            exists:
              - if: linux
                then: lib/libclang-cpp.so
              - if: osx
                then: lib/libclang-cpp.dylib
            # absence on windows
            not_exists:
              - if: win
                then:
                  - Library/bin/libclang-cpp.dll
                  - Library/lib/libclang-cpp.lib

  - package:
      name: libclang${{ libclang_soversion }}
    inherit: clangdev-stage
    build:
      string: ${{ variant }}_h${{ hash }}_${{ build_number }}
      script:
        file: install_libclang
      files:
        - if: linux
          then: lib/libclang.so.${{ libclang_soversion }}
        - if: osx
          then: lib/libclang.${{ libclang_soversion }}.dylib
        - if: win
          then: Library/bin/libclang-${{ libclang_soversion }}.dll
      variant:
        down_prioritize_variant: ${{ 0 if variant == "default" else 1 }}
    requirements:
      build:
        - ${{ stdlib('c') }}
        - ${{ compiler('cxx') }}
        - cmake
        - if: unix
          then: make
          else:
            - ninja
            - create-forwarder-dll
        - if: build_platform != target_platform
          then:
            - llvmdev ==${{ version }}
            - libxml2-devel
            - zlib
            - zstd
      host:
        - llvmdev ==${{ version }}
        - llvm ==${{ version }}
          # Use the same requirements as the top-level requirements
        - libxml2-devel
        - zlib
        - zstd
        - if: osx
          then: libcxx-devel ${{ cxx_compiler_version }}.*
      run:
        - if: unix
          then: ${{ pin_subpackage("libclang-cpp" ~ maj_min, exact=True) }}
        - if: osx
          # we need to do this manually because clang_bootstrap has no run-export
          then: libcxx >=${{ version }}
      run_exports:
        # note that the name (e.g. libclang13) does not necessarily
        # match the version lower bound (e.g. >=14.0.0)
        - ${{ pin_subpackage("libclang" ~ libclang_soversion, upper_bound=None) }}
      ignore_run_exports:
        from_package:
          - if: unix
            then:
              # the build fails if it doesn't find the following, but it's not used
              - libxml2-devel
              - zlib
              - zstd
    tests:
      - package_contents:
          files:
            # presence of versioned libraries
            exists:
              - if: linux
                then: lib/libclang.so.${{ libclang_soversion }}
              - if: osx
                then: lib/libclang.${{ libclang_soversion }}.dylib
              - if: win
                then: Library/bin/libclang-${{ libclang_soversion }}.dll
            # absence of unversioned (or misversioned) libraries
            not_exists:
              - if: linux
                then:
                  - lib/libclang.so
                  - lib/libclang.so.${{ major_version }}
                  - lib/libclang.so.${{ version }}
              - if: osx
                then:
                  - lib/libclang.dylib
                  - libclang.${{ major_version }}.dylib
                  - libclang.${{ version }}.dylib
              - if: win
                then:
                  - Library/lib/libclang.lib
                  - Library/bin/libclang.dll
                  - Library/bin/libclang-${{ major_version }}.dll
                  - Library/bin/libclang-${{ version }}.dll

  - package:
      name: libclang
    inherit: clangdev-stage
    build:
      string: ${{ variant }}_h${{ hash }}_${{ build_number }}
      script:
        file: install_libclang
      files:
        - if: linux
          then: lib/libclang.so
        - if: osx
          then: lib/libclang.dylib
        - if: win
          then:
            - Library/bin/libclang.dll
            - Library/lib/libclang.lib
      variant:
        down_prioritize_variant: ${{ 0 if variant == "default" else 1 }}
    requirements:
      build:
        - ${{ stdlib('c') }}
        - ${{ compiler('cxx') }}
        - cmake
        - if: unix
          then: make
          else:
            - ninja
            - create-forwarder-dll
        - if: build_platform != target_platform
          then:
            - llvmdev ==${{ version }}
            - libxml2-devel
            - zlib
            - zstd
      host:
        - ${{ pin_subpackage("libclang" ~ libclang_soversion, exact=True) }}
        - llvmdev ==${{ version }}
        - llvm ==${{ version }}
          # Use the same requirements as the top-level requirements
        - libxml2-devel
        - zlib
        - zstd
        - if: osx
          then: libcxx-devel ${{ cxx_compiler_version }}.*
      run:
        - ${{ pin_subpackage("libclang" ~ libclang_soversion, exact=True) }}
        - if: osx
          #  we need to do this manually because clang_bootstrap has no run-export
          then: libcxx >=${{ version }}
      run_exports:
        # note that the name (e.g. libclang13) does not necessarily
        # match the version lower bound (e.g. >=14.0.0)
        - ${{ pin_subpackage("libclang" ~ libclang_soversion, upper_bound=None) }}
      ignore_run_exports:
        from_package:
          - if: unix
            then:
              # the build fails if it doesn't find the following, but it's not used
              - libxml2-devel
              - zlib
              - zstd
    tests:
      - package_contents:
          files:
            - if: linux
              then: lib/libclang.so
            - if: osx
              then: lib/libclang.dylib
            - if: win
              then:
                - Library/bin/libclang.dll
                - Library/lib/libclang.lib

  - package:
      name: clang-${{ major_version }}
    inherit: clangdev-stage
    build:
      string: ${{ variant }}_h${{ hash }}_${{ build_number }}
      script:
        file: install_clang_maj
      files:
        - if: unix
          then:
            - lib/clang/${{ major_version }}/*
            - bin/clang-${{ major_version }}
            - bin/clang++-${{ major_version }}
          else:
            - Library/lib/clang/${{ major_version }}/*
            - Library/bin/clang-${{ major_version }}.exe
            - Library/bin/clang++-${{ major_version }}.exe
      variant:
        down_prioritize_variant: ${{ 0 if variant == "default" else 1 }}
    requirements:
      build:
        - ${{ stdlib('c') }}
        - ${{ compiler('cxx') }}
        - cmake
        - if: unix
          then: make
          else: ninja
        - if: build_platform != target_platform
          then:
            - llvmdev ==${{ version }}
            - libxml2-devel
            - zlib
            - zstd
      host:
        - if: unix
          then: ${{ pin_subpackage("libclang-cpp" ~ maj_min, exact=True) }}
        - llvm-openmp ==${{ version }}
        - llvmdev ==${{ version }}
        - llvm ==${{ version }}
          # Use the same requirements as the top-level requirements
        - libxml2-devel
        - zlib
        - zstd
        - if: osx
          then: libcxx-devel ${{ cxx_compiler_version }}.*
      run:
        - compiler-rt${{ major_version }} ==${{ version }}
        - if: unix
          then: ${{ pin_subpackage("libclang-cpp" ~ maj_min, exact=True) }}
        - if: osx
          # we need to do this manually because clang_bootstrap has no run-export
          then: libcxx >=${{ version }}
      ignore_run_exports:
        from_package:
          # the build fails if it doesn't find the following, but it's not used
          - libxml2-devel
          - llvm-openmp
          - if: unix
            then:
              - zlib
              - zstd
    tests:
      - package_contents:
          files:
            exists:
              # headers in clang-specific locations
              - if: unix
                then:
                  - lib/clang/${{ major_version }}/include/stdatomic.h
                  - lib/clang/${{ major_version }}/include/omp.h
                else:
                  - Library/lib/clang/${{ major_version }}/include/stdatomic.h
                  - Library/lib/clang/${{ major_version }}/include/omp.h
              # presence of versioned libraries
              - if: linux
                then: lib/libclang-cpp.so.${{ sover }}
              - if: osx
                then: lib/libclang-cpp.${{ sover }}.dylib
            not_exists:
              # absence of unversioned libraries (should only be in `libclang-cpp`)
              - if: linux
                then: lib/libclang-cpp.so
              - if: osx
                then: libclang-cpp.dylib
              # absence of unversioned binaries
              - if: unix
                then:
                  - bin/clang
                  - bin/clang-cl
                  - bin/clang-cpp
                else:
                  - Library/bin/clang.exe
                  - Library/bin/clang-cl.exe
                  - Library/bin/clang-cpp.exe
      - requirements:
          run:
            - llvm-openmp ==${{ version }}
        script:
          # versioned binaries
          - clang-${{ major_version }} --version
          - clang++-${{ major_version }} --version

  - package:
      name: clang_impl_${{ target_platform }}
    inherit: clangdev-stage
    build:
      skip: win
      string: ${{ variant }}_h${{ hash }}_${{ build_number }}
      script:
        file: install_clang_symlinks
      variant:
        down_prioritize_variant: ${{ 0 if variant == "default" else 1 }}
    requirements:
      host:
        - ${{ pin_subpackage("clang-" ~ major_version, exact=True) }}
      run:
        - ${{ pin_subpackage("clang-" ~ major_version, exact=True) }}
        - compiler-rt_${{ target_platform }}
        - compiler-rt ${{ version }}.*
        - if: linux
          then:
            - binutils_impl_${{ target_platform }}
            - libgcc-devel_${{ target_platform }}
            - sysroot_${{ target_platform }}
          else:
            - cctools_impl_${{ target_platform }}
            - ld64_${{ target_platform }} * llvm${{ maj_min|replace(".", "_") }}_*
    tests:
      - script:
          - if: linux and x86_64
            then:
              - x86_64-conda-linux-gnu-clang --version
              - x86_64-conda-linux-gnu-clang-cpp --version
          - if: linux and aarch64
            then:
              - aarch64-conda-linux-gnu-clang --version
              - aarch64-conda-linux-gnu-clang-cpp --version
          - if: linux and ppc64le
            then:
              - powerpc64le-conda-linux-gnu-clang --version
              - powerpc64le-conda-linux-gnu-clang-cpp --version
          - if: osx and x86_64
            then:
              - x86_64-apple-darwin13.4.0-clang --version
              - x86_64-apple-darwin13.4.0-clang-cpp --version
          - if: osx and arm64
            then:
              - arm64-apple-darwin20.0.0-clang --version
              - arm64-apple-darwin20.0.0-clang-cpp --version

  - package:
      name: clang
    inherit: clangdev-stage
    build:
      string: ${{ variant }}_${{ "cfg" if with_cfg else "nocfg" }}_h${{ hash }}_${{ build_number }}
      script:
        file: install_clang_symlinks
      variant:
        # increasing numbers correspond to decreasing priority
        # 0:     with_cfg, variant == "default"
        # 1: not with_cfg, variant == "default"
        # 2:     with_cfg, variant != "default"
        # 3: not with_cfg, variant != "default"
        down_prioritize_variant: ${{ ((not with_cfg) | int) + 2 * ((variant != "default") | int) }}
    requirements:
      build:
        # for run-exports
        - if: win
          then:
            - ${{ stdlib('c') }}
            - ${{ compiler('cxx') }}
      host:
        - ${{ pin_subpackage("clang-" ~ major_version, exact=True) }}
        - llvmdev ==${{ version }}
          # Use the same requirements as the top-level requirements
        - libxml2-devel
        - zlib
        - zstd
        - if: osx
          then: libcxx-devel ${{ cxx_compiler_version }}.*
      run:
        - ${{ pin_subpackage("clang-" ~ major_version, exact=True) }}
        - llvm-openmp >=${{ version }}
        - if: unix
          then: ${{ pin_subpackage("clang_impl_" ~ target_platform, exact=True) }}
        - if: linux
          then:
            - binutils
            - libgcc-devel_${{ target_platform }}
            - sysroot_${{ target_platform }}
        - if: osx
          then:
            - cctools
            - ld64
            - ld64_${{ target_platform }} * llvm${{ maj_min|replace(".", "_") }}_*
            - llvm-tools ==${{ version }}
      ignore_run_exports:
        from_package:
          # the build fails if it doesn't find the following, but it's not used
          - libxml2-devel
          - if: unix
            then:
              - zlib
              - zstd
    tests:
      - package_contents:
          files:
            # presence of versioned libraries
            - if: linux and x86_64
              then: lib/clang/${{ major_version }}/lib/linux/clang_rt.crtend-x86_64.o
            - if: linux and aarch64
              then: lib/clang/${{ major_version }}/lib/linux/clang_rt.crtend-aarch64.o
            - if: linux and ppc64le
              then: lib/clang/${{ major_version }}/lib/linux/clang_rt.crtend-powerpc64le.o
            - if: osx
              then: lib/clang/${{ major_version }}/lib/darwin/libclang_rt.osx.a
            - if: win
              then: Library/lib/clang/${{ major_version }}/lib/windows/clang_rt.builtins-x86_64.lib
      - script:
          - clang --version
          - clang-cl --version
          - clang-cpp --version

  - package:
      name: clangxx_impl_${{ target_platform }}
    inherit: clangdev-stage
    build:
      skip: win
      string: ${{ variant }}_h${{ hash }}_${{ build_number }}
      script:
        file: install_clang_symlinks
      variant:
        down_prioritize_variant: ${{ 0 if variant == "default" else 1 }}
    requirements:
      host:
        - ${{ pin_subpackage("clang-" ~ major_version, exact=True) }}
      run:
        - ${{ pin_subpackage("clang_impl_" ~ target_platform, exact=True) }}
        - ${{ pin_subpackage("clang-" ~ major_version, exact=True) }}
        - ${{ pin_subpackage("clang-scan-deps", exact=True) }}
        - if: linux
          then: libstdcxx-devel_${{ target_platform }}
          # only minor-pin to avoid issues when building new libcxx versions
          else: libcxx-devel ${{ maj_min }}.*
    tests:
      - script:
          - if: linux and x86_64
            then: x86_64-conda-linux-gnu-clang++ --version
          - if: linux and aarch64
            then: aarch64-conda-linux-gnu-clang++ --version
          - if: linux and ppc64le
            then: powerpc64le-conda-linux-gnu-clang++ --version
          - if: osx and x86_64
            then: x86_64-apple-darwin13.4.0-clang++ --version
          - if: osx and arm64
            then: arm64-apple-darwin20.0.0-clang++ --version

  - package:
      name: clangxx
    inherit: clangdev-stage
    build:
      string: ${{ variant }}_${{ "cfg" if with_cfg else "nocfg" }}_h${{ hash }}_${{ build_number }}
      script:
        file: install_clang_symlinks
      variant:
        # increasing numbers correspond to decreasing priority
        # 0:     with_cfg, variant == "default"
        # 1: not with_cfg, variant == "default"
        # 2:     with_cfg, variant != "default"
        # 3: not with_cfg, variant != "default"
        down_prioritize_variant: ${{ ((not with_cfg) | int) + 2 * ((variant != "default") | int) }}
    requirements:
      build:
        # for run-exports
        - if: win
          then:
            - ${{ stdlib('c') }}
            - ${{ compiler('cxx') }}
      host:
        - ${{ pin_subpackage("clang-" ~ major_version, exact=True) }}
        - llvmdev ==${{ version }}
        - libxml2-devel
        - zlib
        - zstd
        - if: unix
          then: ${{ pin_subpackage("clangxx_impl_" ~ target_platform, exact=True) }}
        - if: osx
          # cannot pin to `cxx_compiler_version` here,
          # because clangxx_impl_ pins libcxx-devel to `maj_min`
          then: libcxx-devel ${{ maj_min }}.*
      run:
        - ${{ pin_subpackage("clang", exact=True) }}
        - if: unix
          then: ${{ pin_subpackage("clangxx_impl_" ~ target_platform, exact=True) }}
        - if: linux
          then: libstdcxx-devel_${{ target_platform }}
        - if: osx
          # only minor-pin to avoid issues when building new libcxx versions
          then: libcxx-devel ${{ maj_min }}.*
      ignore_run_exports:
        from_package:
          # the build fails if it doesn't find the following, but it's not used
          - libxml2-devel
          - if: unix
            then:
              - zlib
              - zstd
    tests:
      - requirements:
          run:
            - ${{ compiler("cxx") }}
            - if: win
              then: gxx_impl_${{ target_platform }}
        files:
          recipe:
            - mytest.cxx
        script:
          - if: win
            then:
              # avoid CMake picking up random clang in image when using unactivated compilers
              - rmdir /s /q "C:\Program Files\Microsoft Visual Studio\2022\Enterprise\VC\Tools\Llvm" || true
              - rmdir /s /q "C:\Program Files\Microsoft Visual Studio\2026\Enterprise\VC\Tools\Llvm" || true
          - clang++ --version
          - clang++-${{ major_version }} --version
          - clang++ -v -c mytest.cxx
          # test that compilers work without CONDA_BUILD_SYSROOT
          - if: unix
            then: unset CONDA_BUILD_SYSROOT
            else: set "CONDA_BUILD_SYSROOT="
          - clang++ -v -c mytest.cxx
          - if: win
            then: clang++ -v mytest.cxx --target=x86_64-w64-mingw32

  - package:
      name: clang-format-${{ major_version }}
    inherit: clangdev-stage
    build:
      skip: win
      string: ${{ variant }}_h${{ hash }}_${{ build_number }}
      script:
        file: install_clang_format
      files:
        - bin/clang-format-${{ major_version }}
      variant:
        down_prioritize_variant: ${{ 0 if variant == "default" else 1 }}
    requirements:
      build:
        # "compiling .pyc files" fails without this
        - python >3
        - ${{ stdlib('c') }}
        - ${{ compiler('cxx') }}
        - cmake
        - make
        - if: build_platform != target_platform
          then: llvmdev ==${{ version }}
      host:
        # it does not matter whether we use cfg or nocfg clang{,xx} in host
        - ${{ pin_subpackage("clang", exact=True) }}
        - ${{ pin_subpackage("clangxx", exact=True) }}
        - ${{ pin_subpackage("libclang", exact=True) }}
        - ${{ pin_subpackage("libclang-cpp", exact=True) }}
        - llvmdev ==${{ version }}
        - llvm ==${{ version }}
        - libxml2-devel
        - zlib
        - zstd
        - if: osx
          # cannot pin to `cxx_compiler_version` here,
          # because clangxx_impl_ pins libcxx-devel to `maj_min`
          then: libcxx-devel ${{ maj_min }}.*
      run:
        - ${{ pin_subpackage("libclang-cpp" ~ maj_min, upper_bound="x.x") }}
        - if: osx
          # we need to do this manually because clang_bootstrap has no run-export
          then: libcxx >=${{ version }}
      ignore_run_exports:
        from_package:
          - if: unix
            then:
              # the build fails if it doesn't find the following, but it's not used
              - libxml2-devel
              - zlib
              - zstd
    tests:
      - package_contents:
          files:
            not_exists:
              - bin/clang-format
              - bin/c-index-test
      - script:
          - clang-format-${{ major_version }} --version

  - package:
      name: clang-format
    inherit: clangdev-stage
    build:
      string: ${{ variant }}_h${{ hash }}_${{ build_number }}
      script:
        file: install_clang_format
      files:
        - if: unix
          then: bin/clang-format
          else: Library/bin/clang-format.exe
      variant:
        down_prioritize_variant: ${{ 0 if variant == "default" else 1 }}
    requirements:
      build:
        # "compiling .pyc files" fails without this
        - python >3
        - ${{ stdlib('c') }}
        - ${{ compiler('cxx') }}
        - cmake
        - if: unix
          then: make
          else: ninja
        - if: build_platform != target_platform
          then:
            - llvmdev ==${{ version }}
            - libxml2-devel
            - zlib
            - zstd
      host:
        # it does not matter whether we use cfg or nocfg clang{,xx} in host
        - ${{ pin_subpackage("clang", exact=True) }}
        - ${{ pin_subpackage("clangxx", exact=True) }}
        - ${{ pin_subpackage("libclang", exact=True) }}
        - ${{ pin_subpackage("libclang-cpp", exact=True) }}
        - llvmdev ==${{ version }}
        - llvm ==${{ version }}
        - libxml2-devel
        - zlib
        - zstd
        - if: unix
          then: ${{ pin_subpackage("clang-format-" ~ major_version, exact=True) }}
        - if: osx
          # cannot pin to `cxx_compiler_version` here,
          # because clangxx_impl_ pins libcxx-devel to `maj_min`
          then: libcxx-devel ${{ maj_min }}.*
      run:
        - ${{ pin_subpackage("clang", exact=True) }}
        - if: unix
          then:
            - ${{ pin_subpackage("libclang-cpp" ~ maj_min, upper_bound="x.x") }}
            - ${{ pin_subpackage("clang-format-" ~ major_version, exact=True) }}
        - if: osx
          # we need to do this manually because clang_bootstrap has no run-export
          then: libcxx >=${{ version }}
      ignore_run_exports:
        from_package:
          - if: unix
            then:
              # the build fails if it doesn't find the following, but it's not used
              - libxml2-devel
              - zlib
              - zstd
    tests:
      - package_contents:
          files:
            not_exists:
              - if: unix
                then: bin/c-index-test
                else: bin/c-index-test.exe
      - script:
          - clang-format --version

  - package:
      name: clang-scan-deps
    inherit: clangdev-stage
    build:
      skip: win
      string: ${{ variant }}_h${{ hash }}_${{ build_number }}
      script:
        file: install_clang_scan_deps
      files:
        - bin/clang-scan-deps
        - bin/clang-scan-deps-${{ major_version }}
        - if: linux and x86_64
          then: bin/x86_64-conda-linux-gnu-clang-scan-deps
        - if: linux and aarch64
          then: bin/aarch64-conda-linux-gnu-clang-scan-deps
        - if: linux and ppc64le
          then: bin/powerpc64le-conda-linux-gnu-clang-scan-deps
        - if: osx and x86_64
          then: bin/x86_64-apple-darwin13.4.0-clang-scan-deps
        - if: osx and arm64
          then: bin/arm64-apple-darwin20.0.0-clang-scan-deps
      variant:
        down_prioritize_variant: ${{ 0 if variant == "default" else 1 }}
    requirements:
      build:
        # "compiling .pyc files" fails without this
        - python >3
        - ${{ stdlib('c') }}
        - ${{ compiler('cxx') }}
        - cmake
        - make
        - if: build_platform != target_platform
          then: llvmdev ==${{ version }}
      host:
        - ${{ pin_subpackage("libclang", exact=True) }}
        - ${{ pin_subpackage("libclang-cpp", exact=True) }}
        - llvmdev ==${{ version }}
        - llvm ==${{ version }}
        - libxml2-devel
        - zlib
        - zstd
        - if: osx
          # cannot pin to `cxx_compiler_version` here,
          # because clangxx_impl_ pins libcxx-devel to `maj_min`
          then: libcxx-devel ${{ maj_min }}.*
      run:
        - ${{ pin_subpackage("libclang" ~ libclang_soversion, upper_bound=None) }}
        - ${{ pin_subpackage("libclang-cpp" ~ maj_min, upper_bound="x.x") }}
        - if: osx
          # we need to do this manually because clang_bootstrap has no run-export
          then: libcxx >=${{ version }}
      ignore_run_exports:
        from_package:
          - if: unix
            then:
              # the build fails if it doesn't find the following, but it's not used
              - libxml2-devel
              - zlib
              - zstd
    tests:
      - script:
          - clang-scan-deps --version
          - clang-scan-deps-${{ major_version }} --version
          - if: linux and x86_64
            then: x86_64-conda-linux-gnu-clang-scan-deps --version
          - if: linux and aarch64
            then: aarch64-conda-linux-gnu-clang-scan-deps --version
          - if: linux and ppc64le
            then: powerpc64le-conda-linux-gnu-clang-scan-deps --version
          - if: osx and x86_64
            then: x86_64-apple-darwin13.4.0-clang-scan-deps --version
          - if: osx and arm64
            then: arm64-apple-darwin20.0.0-clang-scan-deps --version

  - package:
      name: clang-tools
    inherit: clangdev-stage
    build:
      string: ${{ variant }}_h${{ hash }}_${{ build_number }}
      script:
        file: install_clang_tools
      variant:
        down_prioritize_variant: ${{ 0 if variant == "default" else 1 }}
    requirements:
      build:
        # "compiling .pyc files" fails without this
        - python >3
        - ${{ stdlib('c') }}
        - ${{ compiler('cxx') }}
        - cmake
        - if: unix
          then: make
          else: ninja
        - if: build_platform != target_platform
          then:
            - llvmdev ==${{ version }}
            - libxml2-devel
            - zlib
            - zstd
      host:
        # it does not matter whether we use cfg or nocfg clang{,xx} in host
        - ${{ pin_subpackage("clang", exact=True) }}
        - ${{ pin_subpackage("clangxx", exact=True) }}
        - ${{ pin_subpackage("libclang", exact=True) }}
        - ${{ pin_subpackage("libclang-cpp", exact=True) }}
        - ${{ pin_subpackage("clang-format", exact=True) }}
        - llvmdev ==${{ version }}
        - llvm ==${{ version }}
        - libxml2-devel
        - zlib
        - zstd
        - if: osx
          # cannot pin to `cxx_compiler_version` here,
          # because clangxx_impl_ pins libcxx-devel to `maj_min`
          then: libcxx-devel ${{ maj_min }}.*
      run:
        - ${{ pin_subpackage("clang-format", exact=True) }}
        - ${{ pin_subpackage("libclang" ~ libclang_soversion, upper_bound=None) }}
        - if: unix
          then:
            - ${{ pin_subpackage("clang-scan-deps", exact=True) }}
            - ${{ pin_subpackage("libclang-cpp" ~ maj_min, upper_bound="x.x") }}
        - if: osx
          # we need to do this manually because clang_bootstrap has no run-export
          then: libcxx >=${{ version }}
        - if: win and x86_64
          then: ucrt
      run_constraints:
        - clangdev ==${{ version }}
      ignore_run_exports:
        from_package:
          - if: unix
            then:
              # the build fails if it doesn't find the following, but it's not used
              - zlib
              - zstd
    tests:
      - script:
          - clang-check --version
          - clang-tidy --version
          - if: unix
            # absence of "doubly versioned" binaries
            then: test -z "$(find "${PREFIX}/bin" -name '*-${{ major_version }}-${{ major_version }}' -print)"

  - name: python-clang
    build:
      noarch: python
      # Building this output using this recipe is only supported on unix
      # It can still be installed on Windows as it is marked as `noarch: python`
      skip: true  # [not linux64]
      string: {{ variant }}_h{{ PKG_HASH }}_{{ build_number }}
    script: build_python_bindings.sh
    requirements:
      host:
        - python {{ python_min }}
      run:
        - python >={{ python_min }}
        - libclang {{ version }}
    test:
      requires:
        - python {{ python_min }}
      source_files:
        - clang/bindings/python/tests
        - clang/bindings/python/examples/cindex
        - clang/include/clang-c
      imports:
        - clang
        - clang.cindex
      commands:
        - cd clang/bindings/python
        - python -m unittest discover -v

